name: DevSecOps Pipeline

on:
    push:
        branches: [ main, master ]
    pull_request:
        branches: [ main, master ]

jobs:
    security-scan:
        runs-on: ubuntu-latest

        env:
            PYTHONPATH: .

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  pip install --upgrade pip
                  pip install bandit safety pytest pytest-cov httpx
                  pip install -r requirements.txt

            - name: Run tests with coverage
              run: |
                  pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
              continue-on-error: false

            - name: Bandit security scan
              run: bandit -r app/ -f json -o bandit-report.json || true

            - name: Safety check
              run: safety scan || true

            - name: Build Docker image
              run: |
                  docker build -t secure-fastapi-api:latest .
                  docker images | grep secure

            - name: Install Trivy
              run: |
                  wget https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
                  sudo dpkg -i trivy_0.70.0_Linux-64bit.deb

            - name: Run Trivy vulnerability scan
              run: trivy image --severity HIGH,CRITICAL --exit-code 0 --ignore-unfixed
                  secure-fastapi-api:latest

            - name: Run container test
              run: |
                  docker run -d -p 8000:8000 --name test-api secure-fastapi-api:latest
                  sleep 5
                  curl -f http://localhost:8000/health
                  docker stop test-api
                  docker rm test-api

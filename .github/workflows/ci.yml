name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # Buena práctica: Cachea dependencias para que el pipeline vuele 🚀

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pytest pytest-cov httpx
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --cov=app

      # Análisis Estático de Código (SAST)
      # Quitamos el || true. Si hay vulnerabilidades severas, queremos que falle.
      - name: Bandit SAST scan
        run: bandit -r app/ -ll -ii
        # -ll: Reporta solo vulnerabilidades Medium y High (ignora Low)
        # -ii: Ignora niveles de confianza bajos

        # Análisis de Composición de Software (SCA)
      - name: Safety SCA check
        run: safety check -r requirements.txt

      - name: Build Docker image
        run: docker build -t secure-fastapi-api:latest .

      # Usamos la Action Oficial de Trivy (Mejor mantenibilidad)
      - name: Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "secure-fastapi-api:latest"
          format: "table"
          # Rompemos el build (--exit-code 1) solo si hay vulnerabilidades CRÍTICAS o ALTAS con parches disponibles
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # Smoke Test final
      - name: Smoke Test Container
        run: |
          docker run -d -p 8000:8000 --name test-api secure-fastapi-api:latest
          sleep 5 # Esperamos a que Uvicorn levante
          curl --fail http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api
          docker rm test-api
